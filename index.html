<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitten Manager</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; border-bottom: 2px solid #e74c3c; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .btn-add { background-color: #2ecc71; color: white; }
        .btn-add:hover { background-color: #27ae60; }
        .kitten-list { list-style: none; padding: 0; }
        .kitten-item { background: #fff; border: 1px solid #eee; margin-bottom: 10px; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .btn-delete { background-color: #e74c3c; color: white; padding: 5px 10px; }
        .btn-delete:hover { background-color: #c0392b; }
    </style>
</head>
<body>

<div class="container">
    <h2>🐾 Kitten Manager</h2>
    
    <div class="form-group">
        <input type="text" id="kittenName" placeholder="Enter kitten name...">
        <button class="btn-add" onclick="addKitten()">Add Kitten</button>
    </div>

    <h3>Your Kittens:</h3>
    <ul id="list" class="kitten-list">
        <li>Loading kittens...</li>
    </ul>
</div>

<script>
    const API_URL = "http://localhost:3000/api/kittens";

    
    async function loadKittens() {
        const res = await fetch(API_URL);
        const json = await res.json();
        const list = document.getElementById('list');
        list.innerHTML = "";

        json.data.forEach(kitten => {
            list.innerHTML += `
                <li class="kitten-item">
                    <span>${kitten.name}</span>
                    <button class="btn-delete" onclick="deleteKitten('${kitten._id}')">Delete</button>
                </li>
            `;
        });
    }

    
    async function addKitten() {
        const nameInput = document.getElementById('kittenName');
        if (!nameInput.value) return alert("Please enter a name");

        await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: nameInput.value })
        });

        nameInput.value = "";
        loadKittens();
    }

    
    async function deleteKitten(id) {
        if(confirm("Delete this kitten?")) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            loadKittens();
        }
    }

    
    loadKittens();
</script>

</body>
</html>
